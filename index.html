<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap"
        rel="stylesheet">

  <title>Mahi Weather App</title>
</head>

<body>
  <div class="container">
    <div class="weather-card animate__animated animate__fadeIn">
      <h1 class="title">Mahi Weather App</h1>
      <h3>Live Forecast</h3>

      <input type="text" id="city-input" placeholder="Enter city name">
      <button id="city-input-btn">Search</button>

      <div id="weather-info" class="animate__animated animate__fadeIn">
        <h2 id="city-name"></h2>
        <p id="date"></p>
        <img id="weather-icon" src="" alt="icon">
        <p id="temperature"></p>
        <p id="description"></p>
        <p id="wind-speed"></p>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.1/moment.min.js"></script>
  <script src="script2.js"></script>

  <script>
    $('#city-input-btn').on('click', function () {
      let cityName = $('#city-input').val();
      weatherFn(cityName);
    });
  </script>

</body>

</html>
