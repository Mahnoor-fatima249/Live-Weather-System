<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahi Air | Next-Gen Weather</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="main-wrapper">
        <div class="glass-search">
            <input type="text" id="city-input" placeholder="Find your city...">
            <button id="city-input-btn"><i class="fa-solid fa-arrow-right"></i></button>
        </div>

        <div class="hero-card" id="weather-info">
            <div class="location-tag">
                <i class="fa-solid fa-location-arrow"></i>
                <span id="city-name">Loading...</span>
            </div>

            <div class="display-center">
                <h1 id="temperature">--</h1>
                <div class="condition-box">
                    <img id="weather-icon" src="" alt="">
                    <p id="description">Stay Tuned</p>
                </div>
            </div>

            <div class="bottom-stats">
                <div class="stat-box">
                    <p>Wind Flow</p>
                    <h4 id="wind-speed">0.0</h4>
                </div>
                <div class="stat-box">
                    <p>Local Time</p>
                    <h4 id="date">--:--</h4>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.1/moment.min.js"></script>
    <script src="script2.js"></script>
</body>
</html>
